services:
  backend:
    build:
      context: ./apps/backend
    env_file:
      - ./apps/backend/.env
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      HOST: 0.0.0.0
      PORT: 8082
      RELOAD: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Route get_waiting_periods through the REMOTE TFY MCP Gateway instead of
      # the local tool body. These mirror GROQ_API_KEY above — read NATIVELY
      # from the deploy environment (host shell / TrueFoundry secrets) and
      # override the .env defaults, so the gateway URL + token never bake into
      # the image. Default selects the spike tool remotely; pass USE_MCP_FOR=""
      # to fall back to local resolution (CONTEXT.md §A6 / Step 5.2).
      USE_MCP_FOR: ${USE_MCP_FOR:-get_waiting_periods}
      TFY_MCP_URL: ${TFY_MCP_URL}
      TFY_MCP_TOKEN: ${TFY_MCP_TOKEN}
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped

  # Step 5.2 SPIKE — PolicyDesk MCP server. REUSES the backend image (same build
  # context) with a different command, so it shares the backend's Python env and
  # has src.* on its path. THIN wrapper: exposes one tool (get_waiting_periods)
  # over STREAMABLE-HTTP at POST /mcp (matches the TFY MCP Gateway + backend MCP
  # client; SSE made every gateway POST 405). No chaos/retry/secrets here —
  # resilience stays in the graph (§A4).
  mcp:
    build:
      context: ./apps/backend
    command: ["python", "-m", "src.mcp_server.server"]
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8081
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3002
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
